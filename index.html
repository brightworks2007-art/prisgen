<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PRISgen int'l Limited</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #5B2D8E; --purple-dark: #2D1459;
      --gold: #C9973A; --dark: #0A0612; --dark-card: #1A1028;
      --text: #F5EEFF; --text-muted: rgba(200,168,233,0.45);
      --border: rgba(200,168,233,0.2);
    }
    body {
      min-height: 100vh; background: var(--dark); color: var(--text);
      font-family: 'DM Mono', monospace;
      display: flex; align-items: center; justify-content: center;
      background-image:
        radial-gradient(ellipse at 30% 50%, rgba(91,45,142,0.2) 0%, transparent 55%),
        radial-gradient(ellipse at 70% 30%, rgba(201,151,58,0.06) 0%, transparent 45%);
      animation: fadeIn 1s ease both;
    }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    .wrap { text-align: center; padding: 40px 24px; }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.5rem; font-weight: 700;
      color: var(--text); letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .logo span { color: var(--gold); font-style: italic; }

    .tagline {
      font-size: 0.6rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 48px;
    }

    .status-card {
      background: var(--dark-card); border: 1px solid var(--border);
      padding: 32px 48px; display: inline-block; margin-bottom: 32px;
    }

    .status-dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: #25D366;
      margin-right: 10px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.7); }
    }

    .status-text {
      font-size: 0.65rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--text);
    }

    .status-sub {
      font-size: 0.55rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--text-muted);
      margin-top: 10px;
    }

    .v-tag {
      font-size: 0.5rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--gold);
      border: 1px solid rgba(201,151,58,0.3);
      padding: 4px 12px; display: inline-block; margin-top: 24px;
    }

    .admin-link {
      display: block; margin-top: 40px;
      font-size: 0.52rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--text-muted);
      text-decoration: none; transition: color 0.3s;
    }
    .admin-link:hover { color: var(--gold); }

    {% if is_admin %}
    .admin-notice {
      margin-top: 20px; padding: 16px 24px;
      border: 1px solid rgba(201,151,58,0.3);
      background: rgba(201,151,58,0.06);
      font-size: 0.6rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--gold);
    }
    {% endif %}
  </style>
</head>
<body>
  <div class="wrap">

    <div class="logo">PRIS<span>gen</span></div>
    <p class="tagline">int'l Limited &nbsp;·&nbsp; Italian Luxury Shoes & Bags &nbsp;·&nbsp; Lagos</p>

    <div class="status-card">
      <div>
        <span class="status-dot"></span>
        <span class="status-text">V1 — Foundation Live</span>
      </div>
      <p class="status-sub">Flask · PostgreSQL · Render-ready</p>
    </div>

    <br>
    <span class="v-tag">Build in progress — full site coming in V2</span>

    {% if is_admin %}
    <div class="admin-notice">
      ✦ &nbsp; Lady C — you're in. Admin access active.
      &nbsp;·&nbsp; <a href="/exitlady" style="color:var(--gold);text-decoration:none;">Exit</a>
    </div>
    {% else %}
    <a href="/lady" class="admin-link">Private access →</a>
    {% endif %}

  </div>
</body>
</html>
